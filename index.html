<style>
    .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 200, "GRAD" 0, "opsz" 24
    }
    .grain-overlay {
        background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuB4UAlbdNUrpHIs41p6kWDoshPhiz2x7tKd1gq6eUxA1R9hrmpz6q4x3JDV5MESRCQv7HtVgfnGVq6M9WitiqBXzQAgwTlP8FuQP3hXnMA9Kr2YWaLSdaiF9awsJFJC79mrfEfVszn2K0UEHVv-T9Hue6-PF9WRF3xN60P4U4OheR2lOpjVyuhbygLcwoqxlf_Bg6hNc2Y816nwdR2zxTKSZhC6fzNBm_b7l6y66_O8X0pIk6_oAqeeV2j1HqyVcfnRbwkSK0vSsoE);
        opacity: 0.03
    }

    /* Animations */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideInDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes pulse-glow {
        0%, 100% {
            box-shadow: 0 0 0 0 rgba(92, 94, 99, 0.3);
        }
        50% {
            box-shadow: 0 0 0 10px rgba(92, 94, 99, 0);
        }
    }

    @keyframes float {
        0%, 100% {
            transform: translateY(0px);
        }
        50% {
            transform: translateY(-5px);
        }
    }

    /* Element animations */
    main {
        animation: fadeInUp 0.8s ease-out;
    }

    footer {
        animation: fadeInUp 1s ease-out 0.2s both;
    }

    .logo-container {
        animation: float 3s ease-in-out infinite;
    }

    /* Enhanced button styles */
    .primary-btn {
        position: relative;
        overflow: hidden;
    }

    .primary-btn::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .primary-btn:hover::before {
        width: 300px;
        height: 300px;
    }

    .primary-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(92, 94, 99, 0.25);
    }

    .primary-btn:active {
        transform: translateY(0);
    }

    .secondary-btn {
        position: relative;
        transition: all 0.3s ease;
    }

    .secondary-btn::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: currentColor;
        transition: width 0.3s ease;
    }

    .secondary-btn:hover::after {
        width: 100%;
    }

    .security-tag {
        animation: fadeInUp 1.2s ease-out 0.4s both;
    }

    .title-text {
        animation: slideInDown 0.8s ease-out 0.1s both;
    }

    .subtitle-text {
        animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .divider-line {
        animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
        main {
            padding: 2rem 1rem;
        }

        h1 {
            animation: slideInDown 0.8s ease-out 0.1s both;
        }

        footer {
            padding: 1rem;
            max-width: 100%;
            gap: 1rem !important;
        }
    }

    @media (max-width: 640px) {
        main {
            padding: 1rem;
        }

        h1 {
            font-size: 2.5rem;
        }

        .logo-container {
            margin-bottom: 1.5rem;
        }

        .logo-container .w-24.h-24 {
            width: 4rem !important;
            height: 4rem !important;
        }

        .logo-container .w-24.h-24 span {
            font-size: 2rem !important;
        }

        footer .primary-btn {
            height: 3.5rem;
            font-size: 0.95rem;
        }

        footer .secondary-btn {
            font-size: 0.7rem;
        }

        .security-tag {
            font-size: 0.7rem;
        }

        .h-16 {
            animation: slideInDown 0.8s ease-out 0.1s both;
        }
    }
</style>
</head>
<body class="bg-background font-body text-on-background selection:bg-primary-container">
<!-- Splash Screen Wrapper -->
<div class="relative min-h-screen w-full flex flex-col items-center justify-between overflow-hidden">
<!-- Subtle Textural Background -->
<div class="absolute inset-0 z-0 bg-gradient-to-tr from-surface-container via-surface to-surface-container-low"></div>
<div class="absolute inset-0 z-0 grain-overlay"></div>
<!-- Decorative Ambient Light -->
<div class="absolute -top-[10%] -right-[10%] w-[60%] h-[60%] rounded-full bg-surface-container-lowest blur-[120px] opacity-40"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[60%] h-[60%] rounded-full bg-surface-container-highest blur-[120px] opacity-30"></div>
<!-- Top Spacer (Maintains centering) -->
<div class="h-24"></div>
<!-- Central Branding Cluster -->
<main class="relative z-10 flex flex-col items-center text-center px-6">
<!-- Logo Icon Container -->
<div class="mb-10 relative logo-container">
<div class="w-24 h-24 rounded-full bg-inverse-surface flex items-center justify-center shadow-2xl hover:shadow-primary/30 transition-shadow duration-300">
<span class="material-symbols-outlined text-surface-container-lowest text-5xl" data-icon="account_balance">account_balance</span>
</div>
<!-- Subtle Orbiting Detail -->
<div class="absolute -inset-4 border border-outline-variant/10 rounded-full animate-spin-slow"></div>
</div>
<!-- Brand Name Typography -->
<div class="space-y-4">
<h1 class="text-5xl md:text-7xl font-bold tracking-tighter text-inverse-surface font-headline uppercase title-text">
                    Trust <span class="font-light text-primary">Banco</span>
</h1>
<p class="text-on-surface-variant font-medium tracking-[0.2em] text-sm md:text-base uppercase opacity-80 subtitle-text">
                    Sovereign Wealth Management
                </p>
</div>
<!-- Decorative Asset Divider -->
<div class="mt-12 w-px h-16 bg-gradient-to-b from-outline-variant/40 to-transparent divider-line"></div>
</main>
<!-- Footer / Interaction Area -->
<footer class="relative z-10 w-full max-w-md px-8 pb-16 flex flex-col gap-8">
<div class="space-y-6">
<!-- Primary Action -->
<a href="signin.html" class="primary-btn w-full h-16 bg-primary text-on-primary font-bold rounded-full shadow-lg flex items-center justify-center gap-3 no-underline">
<span class="tracking-wide">Continue to Sign In</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</a>
<!-- Secondary Actions -->
<div class="flex items-center justify-center gap-8">
<button class="secondary-btn text-on-surface-variant text-xs font-bold uppercase tracking-widest">
                        Create Account
                    </button>
<div class="w-1 h-1 rounded-full bg-outline-variant/40"></div>
<button class="secondary-btn text-on-surface-variant text-xs font-bold uppercase tracking-widest">
                        Support
                    </button>
</div>
</div>
<!-- Security Assurance Tag -->
<div class="security-tag flex items-center justify-center gap-2 text-[10px] text-outline uppercase tracking-widest">
<span class="material-symbols-outlined text-sm" data-icon="encrypted">encrypted</span>
<span>Military-grade encryption active</span>
</div>
</footer>
<!-- Bottom Safe Area Decoration -->
<div class="absolute bottom-0 w-full h-1 bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>
</div>
<!-- Hidden mapping to prevent shell rendering based on rules -->
<!-- Navigation shell suppressed: Transactional/Focus journey screen -->
</body></html>
