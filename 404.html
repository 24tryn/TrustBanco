<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Page Not Found | Trust Banco</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: 400;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body">
<div class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="max-w-lg text-center">
        <!-- Large 404 -->
        <div class="mb-8">
            <h1 class="text-9xl font-black text-primary-container mb-4">404</h1>
            <span class="material-symbols-outlined text-9xl text-primary opacity-30">error</span>
        </div>

        <!-- Content -->
        <h2 class="text-3xl font-bold mb-4">Page Not Found</h2>
        <p class="text-lg text-on-surface-variant mb-8">
            Sorry, the page you're looking for doesn't exist. It might have been moved or deleted.
        </p>

        <!-- Action Buttons -->
        <div class="flex flex-col gap-4 sm:flex-row justify-center">
            <button onclick="window.history.back()" class="px-8 py-3 bg-surface-container text-on-surface rounded-lg font-bold hover:bg-surface-container-high transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">arrow_back</span>
                Go Back
            </button>
            <a href="signin.html" class="px-8 py-3 bg-primary text-on-primary rounded-lg font-bold hover:bg-primary-dim transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">home</span>
                Return Home
            </a>
        </div>

        <!-- Suggestions -->
        <div class="mt-16 pt-8 border-t border-outline-variant/20">
            <p class="text-sm text-on-surface-variant mb-4">Did you need any of these?</p>
            <div class="grid grid-cols-3 gap-4">
                <a href="dashboard.html" class="p-4 bg-surface-container rounded-lg hover:bg-surface-container-high transition-colors">
                    <span class="material-symbols-outlined text-primary block mb-2">dashboard</span>
                    <span class="text-xs font-bold">Dashboard</span>
                </a>
                <a href="support.html" class="p-4 bg-surface-container rounded-lg hover:bg-surface-container-high transition-colors">
                    <span class="material-symbols-outlined text-primary block mb-2">help</span>
                    <span class="text-xs font-bold">Support</span>
                </a>
                <a href="signin.html" class="p-4 bg-surface-container rounded-lg hover:bg-surface-container-high transition-colors">
                    <span class="material-symbols-outlined text-primary block mb-2">login</span>
                    <span class="text-xs font-bold">Sign In</span>
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
