<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift {
            background: linear-gradient(to top, rgba(245, 245, 245, 0.5), transparent);

        .ash-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes buttonPress {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .login-card {
            animation: slideIn 0.6s ease-out;
        }

        /* CSS Properties */
        .keypad-btn {
            transition: all 0.2s ease;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .keypad-btn:hover {
            transform: scale(1.05);
        }

        .keypad-btn:active {
            animation: buttonPress 0.3s ease-out;
        }

        .keypad-number {
            background-color: #fafafa;
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 1.5rem;
                max-width: 100%;
            }
            .keypad-btn {
                font-size: 1.125rem;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 1rem;
            }
            .pin-grid {
                gap: 0.75rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }

        /* Loading state */
        .sign-in-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .sign-in-btn:disabled:hover {
            transform: none;
        }

<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">

<div class="flex flex-col items-center text-center mb-10">
<div class="mb-6">
<span class="material-symbols-outlined text-primary text-5xl filled">security</span>

<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">Trust Banco</h1>

</div>
<!-- Passcode Entry Interface -->
<div class="space-y-8 sm:space-y-10">
<!-- PIN Display Dots -->
<div class="flex justify-center gap-2 sm:gap-3">
<div class="pin-dot w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-surface-container-highest transition-all duration-300" data-index="0"></div>
<div class="pin-dot w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-surface-container-highest transition-all duration-300" data-index="1"></div>
<div class="pin-dot w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-surface-container-highest transition-all duration-300" data-index="2"></div>
<div class="pin-dot w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-surface-container-highest transition-all duration-300" data-index="3"></div>
<div class="pin-dot w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-surface-container-highest transition-all duration-300" data-index="4"></div>
<div class="pin-dot w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-surface-container-highest transition-all duration-300" data-index="5"></div>
</div>
<!-- Numeric Keypad -->
<div class="pin-grid grid grid-cols-3 gap-3 sm:gap-6">
<!-- 1-9 buttons -->
<button class="keypad-btn keypad-number w-full aspect-square flex items-center justify-center rounded-full text-on-surface font-headline text-xl sm:text-2xl font-semibold" data-digit="1">1</button>
<button class="keypad-btn keypad-number w-full aspect-square flex items-center justify-center rounded-full text-on-surface font-headline text-xl sm:text-2xl font-semibold" data-digit="2">2</button>
<button class="keypad-btn keypad-number w-full aspect-square flex items-center justify-center rounded-full text-on-surface font-headline text-xl sm:text-2xl font-semibold" data-digit="3">3</button>
<button class="keypad-btn keypad-number w-full aspect-square flex items-center justify-center rounded-full text-on-surface font-headline text-xl sm:text-2xl font-semibold" data-digit="4">4</button>
<button class="keypad-btn keypad-number w-full aspect-square flex items-center justify-center rounded-full text-on-surface font-headline text-xl sm:text-2xl font-semibold" data-digit="5">5</button>
<button class="keypad-btn keypad-number w-full aspect-square flex items-center justify-center rounded-full text-on-surface font-headline text-xl sm:text-2xl font-semibold" data-digit="6">6</button>
<button class="keypad-btn keypad-number w-full aspect-square flex items-center justify-center rounded-full text-on-surface font-headline text-xl sm:text-2xl font-semibold" data-digit="7">7</button>

<button class="keypad-btn keypad-number w-full aspect-square flex items-center justify-center rounded-full text-on-surface font-headline text-xl sm:text-2xl font-semibold" data-digit="0">0</button>

<a class="font-manrope text-[10px] uppercase tracking-[0.1em] text-neutral-400 hover:text-neutral-700 dark:hover:text-neutral-300 underline-offset-4 hover:underline transition-colors" href="support.html">Security</a>

<script>
    // Check if user is registered
    const userRegistered = SecureStorage.getSecure('trustBancoUser') !== null;
    
    // PIN Input Management
    let pinValue = '';
    const maxPinLength = 6;

    // Get all elements
    const digitButtons = document.querySelectorAll('[data-digit]');
    const backspaceBtn = document.getElementById('backspace-btn');
    const biometricBtn = document.getElementById('biometric-btn');
    const signInBtn = document.getElementById('sign-in-btn');
    const pinDots = document.querySelectorAll('.pin-dot');
    const welcomeText = document.querySelector('.welcome-back-text');

    // Set button text based on user status
    function updateButtonText() {
        if (userRegistered) {
            signInBtn.textContent = 'Sign In';
            const userData = SecureStorage.getSecure('trustBancoUser');
            const firstName = userData?.fullName ? userData.fullName.split(' ')[0] : 'User';
            welcomeText.textContent = `Welcome back, ${firstName}`;
        } else {
            signInBtn.textContent = 'Sign Up';
            welcomeText.textContent = 'Let\'s get you started';
        }
    }

    // Add click listeners to digit buttons
    digitButtons.forEach(button => {
        button.addEventListener('click', (e) => {
            e.preventDefault();
            if (pinValue.length < maxPinLength) {
                pinValue += button.getAttribute('data-digit');
                updatePinDisplay();
                playKeySound();
            }
        });
    });

    // Backspace button
    backspaceBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (pinValue.length > 0) {
            pinValue = pinValue.slice(0, -1);
            updatePinDisplay();
        }
    });

    // Biometric button (placeholder)
    biometricBtn.addEventListener('click', (e) => {
        e.preventDefault();
        alert('Biometric authentication would be triggered here.');
    });

    // Sign In/Sign Up button
    signInBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (pinValue.length === maxPinLength) {
            signInBtn.disabled = true;
            const originalText = signInBtn.textContent;
            signInBtn.textContent = userRegistered ? 'Signing in...' : 'Creating account...';
            
            // Save PIN temporarily with encryption
            SecureStorage.setSecure('trustBancoPin', pinValue);
            
            // Simulate auth delay
            setTimeout(() => {
                if (userRegistered) {
                    // Existing user - go to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // New user - go to signup
                    window.location.href = 'signup.html';
                }
            }, 1500);
        }
    });

    // Update PIN display dots
    function updatePinDisplay() {
        pinDots.forEach((dot, index) => {
            if (index < pinValue.length) {
                dot.classList.add('active');
                dot.style.backgroundColor = '#1e40af'; // primary color
                dot.style.transform = 'scale(1.2)';
            } else {
                dot.classList.remove('active');
                dot.style.backgroundColor = '#e0e0e0'; // surface-container-highest
                dot.style.transform = 'scale(1)';
            }
        });

        // Enable/disable sign-in button
        if (pinValue.length === maxPinLength) {
            signInBtn.disabled = false;
        } else {
            signInBtn.disabled = true;
        }
    }

    // Play subtle key press sound (optional)
    function playKeySound() {
        // Create a simple beep (optional, can be removed)
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 400;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        } catch (e) {
            // Audio context may be blocked, continue without sound
        }
    }

    // Reset PIN
    function resetPin() {
        pinValue = '';
        updatePinDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9' && pinValue.length < maxPinLength) {
            pinValue += e.key;
            updatePinDisplay();
            playKeySound();
        } else if (e.key === 'Backspace') {
            e.preventDefault();
            if (pinValue.length > 0) {
                pinValue = pinValue.slice(0, -1);
                updatePinDisplay();
            }
        } else if (e.key === 'Enter' && pinValue.length === maxPinLength) {
            signInBtn.click();
        }
    });

    // Initialize
    updateButtonText();
    updatePinDisplay();
</script>
</body></html>
